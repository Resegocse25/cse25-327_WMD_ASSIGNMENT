<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Routines & Habits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="banner">
        <h1>Routines & Habits</h1>
        <p>Your feedback helps us improve.</p>
    </div>
    <nav>
        <div class="nav-container">
            <a href="index.html">Home</a>
            <a href="routines.html">Daily Routines</a>
            <a href="study.html">Study Habits</a>
            <a href="time.html">Time Management</a>
            <a href="feedback.html">Feedback</a>
            <a href="about.html">About</a>
        </div>
    </nav>
</header>

<main>
    <h2>Student Feedback Form</h2>
    <p>Have a study method that works for you? Or a suggestion for the site? Let us know below.</p>

    <form action="#" method="post" class="feedback-form">
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" name="email" required placeholder="example@student.ac.bw">
        </div>

        <div class="form-group">
            <label for="topic">Topic of Interest:</label>
            <select id="topic" name="topic" required>
                <option value="">--Please choose an option--</option>
                <option value="routines">Daily Routines</option>
                <option value="study">Study Habits</option>
                <option value="time">Time Management</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">Your Suggestions:</label>
            <textarea id="message" name="message" rows="5" required placeholder="Tell us what you'd like to see..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Feedback</button>
    </form>
</main>

<footer>
    <p>&copy; 2026 Routines & Habits</p>
</footer>

</body>
</html>
